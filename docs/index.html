<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slay the Spire Bot Stats</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #ffd700; margin-bottom: 30px; font-size: 2.5em; }
        .search-box {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input, select, button {
            padding: 10px 15px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            background: #ffd700;
            color: #000;
            cursor: pointer;
            font-weight: bold;
            border: none;
        }
        button:hover { background: #ffed4e; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #ffd700;
        }
        .stat-label { font-size: 12px; color: #aaa; text-transform: uppercase; }
        .stat-value { font-size: 28px; font-weight: bold; color: #ffd700; }
        .stat-sub { font-size: 12px; color: #999; margin-top: 5px; }
        
        .runs-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .runs-table thead {
            background: #2a2a2a;
            border-bottom: 2px solid #ffd700;
        }
        .runs-table th {
            padding: 12px;
            text-align: left;
            color: #ffd700;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }
        .runs-table th:hover {
            background: #333;
        }
        .sort-arrow {
            display: inline-block;
            margin-left: 6px;
            font-size: 11px;
            opacity: 0.6;
        }
        .sort-arrow.active {
            opacity: 1;
            color: #ffed4e;
        }
        .runs-table td {
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        .runs-table tr:hover {
            background: #333;
        }
        .win { color: #4ade80; }
        .loss { color: #ef4444; }
        .filter-tag {
            display: inline-block;
            background: #444;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin: 4px 4px 4px 0;
            cursor: pointer;
        }
        .filter-tag:hover { background: #555; }
        .loading { text-align: center; color: #999; padding: 40px; }
        .info { background: #2a2a2a; padding: 15px; border-radius: 4px; margin-bottom: 20px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ Slay the Spire Bot Analytics</h1>
        
        <div class="info">
            Tracking performance across <span id="total-runs">-</span> runs on <span id="total-strategies">-</span> strategies
        </div>
        
        <div class="search-box">
            <select id="strategy-filter">
                <option value="">All Strategies</option>
            </select>
            <input type="text" id="seed-search" placeholder="Search by seed...">
            <input type="number" id="min-score" placeholder="Min score" min="0">
            <input type="number" id="max-score" placeholder="Max score" min="0">
            <select id="sort-by">
                <option value="date-desc">Date (Newest)</option>
                <option value="date-asc">Date (Oldest)</option>
                <option value="score-desc">Score (High to Low)</option>
                <option value="score-asc">Score (Low to High)</option>
                <option value="floor-desc">Floor (High to Low)</option>
                <option value="floor-asc">Floor (Low to High)</option>
                <option value="seed">Seed (A-Z)</option>
            </select>
            <button onclick="resetFilters()">Reset</button>
        </div>
        
        <div class="stats-grid" id="stats-container"></div>
        
        <div id="runs-container">
            <div class="loading">Loading data...</div>
        </div>
    </div>

    <script>
        let allRuns = [];
        let allStats = {};
        let currentSort = 'date-desc'; // Track current sort
        
        async function loadData() {
            try {
                const resp = await fetch('stats.json');
                const data = await resp.json();
                allRuns = data.runs || [];
                allStats = data.stats || {};
                
                renderStats();
                populateStrategyFilter();
                renderRuns(allRuns);
                
                document.getElementById('total-runs').textContent = allRuns.length;
                document.getElementById('total-strategies').textContent = 
                    Object.keys(allStats.by_strategy || {}).length;
            } catch (e) {
                document.getElementById('runs-container').innerHTML = 
                    '<div class="loading">Error loading data: ' + e.message + '</div>';
            }
        }
        
        function renderStats() {
            const container = document.getElementById('stats-container');
            const strategies = Object.entries(allStats.by_strategy || {})
                .sort((a, b) => b[1].win_rate - a[1].win_rate);
            
            container.innerHTML = strategies.map(([strategy, stats]) => `
                <div class="stat-card" onclick="filterByStrategy('${strategy}')">
                    <div class="stat-label">${strategy}</div>
                    <div class="stat-value">${stats.win_rate}%</div>
                    <div class="stat-sub">${stats.wins}/${stats.runs} wins • ${stats.avg_score} avg</div>
                </div>
            `).join('');
        }
        
        function populateStrategyFilter() {
            const select = document.getElementById('strategy-filter');
            Object.keys(allStats.by_strategy || {})
                .sort()
                .forEach(strategy => {
                    const opt = document.createElement('option');
                    opt.value = strategy;
                    opt.textContent = strategy;
                    select.appendChild(opt);
                });
        }
        
        function getFilters() {
            const strategy = document.getElementById('strategy-filter').value;
            const seed = document.getElementById('seed-search').value.toUpperCase();
            const minScore = parseInt(document.getElementById('min-score').value) || 0;
            const maxScore = parseInt(document.getElementById('max-score').value) || Infinity;
            
            return { strategy, seed, minScore, maxScore };
        }
        
        function getSortFn() {
            const sortBy = document.getElementById('sort-by').value;
            
            const sorters = {
                'date-desc': (a, b) => new Date(b.date) - new Date(a.date),
                'date-asc': (a, b) => new Date(a.date) - new Date(b.date),
                'score-desc': (a, b) => b.score - a.score,
                'score-asc': (a, b) => a.score - b.score,
                'floor-desc': (a, b) => b.floor - a.floor,
                'floor-asc': (a, b) => a.floor - b.floor,
                'seed': (a, b) => a.seed.localeCompare(b.seed)
            };
            
            return sorters[sortBy] || sorters['date-desc'];
        }
        
        function getSortArrow(column) {
            const sortMap = {
                'date': ['date-asc', 'date-desc'],
                'seed': ['seed'],
                'score': ['score-asc', 'score-desc'],
                'floor': ['floor-asc', 'floor-desc']
            };
            
            const relatedSorts = sortMap[column] || [];
            if (!relatedSorts.includes(currentSort)) return '<span class="sort-arrow">⇅</span>';
            
            if (currentSort.includes('desc')) return '<span class="sort-arrow active">↓</span>';
            if (currentSort.includes('asc')) return '<span class="sort-arrow active">↑</span>';
            return '<span class="sort-arrow">⇅</span>';
        }
        
        function columnClickSort(column) {
            const sortMap = {
                'date': ['date-desc', 'date-asc'],
                'seed': ['seed', 'seed'],
                'score': ['score-desc', 'score-asc'],
                'floor': ['floor-desc', 'floor-asc']
            };
            
            if (!sortMap[column]) return;
            
            // Toggle between asc/desc
            if (currentSort === sortMap[column][0]) {
                currentSort = sortMap[column][1];
            } else {
                currentSort = sortMap[column][0];
            }
            
            document.getElementById('sort-by').value = currentSort;
            filterRuns();
        }
        
        function filterRuns() {
            const { strategy, seed, minScore, maxScore } = getFilters();
            currentSort = document.getElementById('sort-by').value;
            
            let filtered = allRuns.filter(run => {
                if (strategy && run.strategy !== strategy) return false;
                if (seed && !run.seed.includes(seed)) return false;
                if (run.score < minScore || run.score > maxScore) return false;
                return true;
            });
            
            // Apply sort
            filtered.sort(getSortFn());
            
            renderRuns(filtered);
        }
        
        function renderRuns(runs) {
            const container = document.getElementById('runs-container');
            if (runs.length === 0) {
                container.innerHTML = '<div class="loading">No runs match filters</div>';
                return;
            }
            
            const rows = runs
                .slice(-500) // Last 500 runs
                .reverse() // Most recent first
                .map(run => {
                    const statusClass = run.won ? 'win' : 'loss';
                    const status = run.won ? '✓ WIN' : `✗ ${run.died_to}`;
                    return `
                        <tr>
                            <td>${run.date}</td>
                            <td><strong>${run.seed}</strong></td>
                            <td>${run.strategy}</td>
                            <td class="${statusClass}">${status}</td>
                            <td>${run.floor}</td>
                            <td><strong>${run.score}</strong></td>
                            <td>${(run.bosses || []).slice(0, 2).join(', ')}</td>
                        </tr>
                    `;
                }).join('');
            
            container.innerHTML = `
                <table class="runs-table">
                    <thead>
                        <tr>
                            <th onclick="columnClickSort('date')">Date${getSortArrow('date')}</th>
                            <th onclick="columnClickSort('seed')">Seed${getSortArrow('seed')}</th>
                            <th>Strategy</th>
                            <th>Result</th>
                            <th onclick="columnClickSort('floor')">Floor${getSortArrow('floor')}</th>
                            <th onclick="columnClickSort('score')">Score${getSortArrow('score')}</th>
                            <th>Bosses</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
                <div class="stat-sub" style="margin-top: 15px; text-align: center;">
                    Showing last ${Math.min(500, runs.length)} of ${runs.length} runs
                </div>
            `;
        }
        
        function filterByStrategy(strategy) {
            document.getElementById('strategy-filter').value = strategy;
            filterRuns();
        }
        
        function resetFilters() {
            document.getElementById('strategy-filter').value = '';
            document.getElementById('seed-search').value = '';
            document.getElementById('min-score').value = '';
            document.getElementById('max-score').value = '';
            document.getElementById('sort-by').value = 'date-desc';
            filterRuns();
        }
        
        // Event listeners
        document.getElementById('strategy-filter').addEventListener('change', filterRuns);
        document.getElementById('seed-search').addEventListener('input', filterRuns);
        document.getElementById('min-score').addEventListener('input', filterRuns);
        document.getElementById('max-score').addEventListener('input', filterRuns);
        document.getElementById('sort-by').addEventListener('change', filterRuns);
        
        // Load on page load
        loadData();
    </script>
</body>
</html>
